<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LAT51</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
    }

    .hero {
      height: 100vh;
      background: url('rotterdam.jpg') center/cover no-repeat;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
    }

    .overlay {
      position: relative;
      z-index: 1;
      padding: 40px;
    }

    h1 {
      font-size: 64px;
      letter-spacing: 6px;
      margin: 0;
    }

    p {
      margin-top: 12px;
      font-size: 18px;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="overlay">
      <h1>LAT51</h1>
      <p>Rotterdam • 51° North • Harbour Culture</p>
    </div>
  </div>
</body>
</html>
