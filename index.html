<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LAT51</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: #fff;
    }

    body {
      overflow: hidden;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      background: url('rotterdam.jpg') center center / cover no-repeat;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.50);
    }

    .topbar {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      padding: 26px 34px 18px 34px;
      z-index: 2;
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .logo {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: 3px;
      color: #fff;
      text-decoration: none;
    }

    .nav {
      display: flex;
      gap: 42px;
      align-items: center;
      justify-content: center;
      flex: 1;
    }

    .nav a {
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 5px;
      text-transform: uppercase;
      opacity: 0.9;
    }

    .coming-soon {
      color: #fff;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.7);
      padding: 16px 34px;
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      display: inline-block;
    }

    .top-line {
      margin-top: 18px;
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.35);
    }

    .content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      align-items: center;
      padding: 120px 42px 90px 42px;
    }

    .content-inner {
      max-width: 900px;
      margin-top: 40px;
    }

    .headline {
      font-size: 92px;
      line-height: 0.95;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 28px;
    }

    .subtext {
      font-size: 20px;
      line-height: 1.8;
      letter-spacing: 2px;
      text-transform: uppercase;
      max-width: 950px;
      color: rgba(255,255,255,0.92);
    }

    .mini-line {
      width: 70px;
      height: 3px;
      background: #fff;
      margin: 22px 0 28px 0;
    }

    .cta {
      display: inline-block;
      margin-top: 18px;
      border: 1px solid rgba(255,255,255,0.7);
      color: #fff;
      text-decoration: none;
      padding: 18px 34px;
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .footer-tags {
      position: absolute;
      left: 34px;
      right: 34px;
      bottom: 24px;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(255,255,255,0.25);
      padding-top: 18px;
      font-size: 14px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.9);
    }

    @media (max-width: 1100px) {
      .headline {
        font-size: 72px;
      }

      .subtext {
        font-size: 18px;
        line-height: 1.7;
      }

      .nav {
        gap: 24px;
      }
    }

    @media (max-width: 820px) {
      body {
        overflow: auto;
      }

      .hero {
        min-height: 100vh;
        height: auto;
      }

      .topbar {
        padding: 22px 20px 14px 20px;
      }

      .topbar-inner {
        flex-direction: column;
        align-items: flex-start;
      }

      .nav {
        gap: 16px;
        flex-wrap: wrap;
        justify-content: flex-start;
      }

      .coming-soon {
        padding: 12px 18px;
        font-size: 12px;
      }

      .content {
        padding: 170px 20px 120px 20px;
        align-items: flex-start;
      }

      .headline {
        font-size: 52px;
      }

      .subtext {
        font-size: 15px;
        line-height: 1.7;
      }

      .footer-tags {
        position: relative;
        left: auto;
        right: auto;
        bottom: auto;
        margin: 0 20px 20px 20px;
        font-size: 11px;
        letter-spacing: 2px;
        gap: 14px;
        flex-wrap: wrap;
      }
    }

    @media (max-width: 480px) {
      .headline {
        font-size: 40px;
      }

      .logo {
        font-size: 24px;
      }

      .nav a {
        font-size: 12px;
        letter-spacing: 3px;
      }

      .subtext {
        font-size: 14px;
      }

      .cta {
        padding: 15px 22px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <header class="topbar">
      <div class="topbar-inner">
        <a href="#" class="logo">LAT51</a>

        <nav class="nav">
          <a href="#">Home</a>
          <a href="#">Collection</a>
          <a href="#">About</a>
          <a href="#">Contact</a>
        </nav>

        <a href="#" class="coming-soon">Coming Soon</a>
      </div>
      <div class="top-line"></div>
    </header>

    <div class="content">
      <div class="content-inner">
        <h1 class="headline">
          Built in Rotterdam.<br>
          Made for hard workers.
        </h1>

        <div class="subtext">
          Geboren in de haven. Gebouwd op karakter.<br>
          LAT51 is meer dan kleding. Het is een levensstijl.
        </div>

        <div class="mini-line"></div>

        <a href="#" class="cta">Join the movement</a>
      </div>
    </div>

    <div class="footer-tags">
      <span>51° North</span>
      <span>Rotterdam</span>
      <span>No Compromise</span>
    </div>
  </section>
</body>
</html>
